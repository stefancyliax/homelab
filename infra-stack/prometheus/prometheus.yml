global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'comin'
    metrics_path: /metrics
    static_configs:
      - targets: 
        - '10.1.23.184:4243' #infra node
        - '10.1.23.224:4243' #services node
        - '10.1.23.165:4243' #another test
        - '10.1.23.247:4243' #gpu worker

  - job_name: 'node_exporter'
    static_configs:
      - targets:
        - '10.1.23.184:9100'
        - '10.1.23.224:9100'
        - '10.1.23.165:9100'
        - '10.1.23.247:9100'

  - job_name: 'docker_daemon'
    static_configs:
      - targets:
        - '10.1.23.184:9323'
        - '10.1.23.224:9323'
        - '10.1.23.165:9323'
        - '10.1.23.247:9323'

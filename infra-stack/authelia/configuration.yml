theme: auto
default_2fa_method: totp

server:
  address: "tcp://0.0.0.0:9091"

log:
  level: info

totp:
  issuer: authelia.com

authentication_backend:
  file:
    path: /config/users_database.yml

access_control:
  default_policy: one_factor
  rules:
    - domain: "*.home.stefancyliax.de"
      policy: one_factor

session:
  name: authelia_session
  secret: unsecure_session_secret # WARNING: Change this in production
  cookies:
    - domain: "stefancyliax.de"
      authelia_url: "https://auth.home.stefancyliax.de"

storage:
  encryption_key: "unsecure_encryption_key_change_in_production" # MUST BE >20 CHARS
  local:
    path: /config/db.sqlite3

identity_validation:
  reset_password:
    jwt_secret: "unsecure_jwt_secret_change_in_production"

notifier:
  filesystem:
    filename: /config/notification.txt

identity_providers:
  oidc:
    hmac_secret: '{{ secret "/config/secrets/oidc_hmac" | trim }}'
    jwks:
      - key_id: main
        algorithm: RS256
        use: sig
        key: {{ secret "/config/secrets/oidc_rsa.pem" | mindent 10 "|" | msquote }}
    clients:
      - client_id: YDpnxyPRS3R_NeMMX6FE.zXC5ZBHTwruQWGYMqguJMgV93WmTRADtUZ2cRxk2EcugIHqbkQi
        client_name: Grimmory
        client_secret: '$pbkdf2-sha512$310000$hpE9VPu3UvXlz44R/nvKnw$Pqj4WCVMny84.baYiVxZsII012rKTSKsIyPc/jOGAAfA/MTeIff6efCcG1fsiSBlb28Zr5b6mTp5bK.DbwIJag'
        public: false
        authorization_policy: one_factor
        require_pkce: true
        pkce_challenge_method: S256
        response_types:
          - code
        scopes:
          - openid
          - profile
          - email
          - groups
        redirect_uris:
          - https://grimmory.home.stefancyliax.de/oauth2-callback

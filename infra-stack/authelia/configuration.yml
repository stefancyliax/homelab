theme: auto
default_2fa_method: totp

server:
  address: "tcp://0.0.0.0:9091"

log:
  level: info

totp:
  issuer: authelia.com

authentication_backend:
  file:
    path: /config/users_database.yml

access_control:
  default_policy: one_factor
  rules:
    - domain: "*.home.stefancyliax.de"
      policy: one_factor

session:
  name: authelia_session
  secret: unsecure_session_secret # WARNING: Change this in production
  cookies:
    - domain: "stefancyliax.de"
      authelia_url: "https://auth.home.stefancyliax.de"

storage:
  encryption_key: "unsecure_encryption_key_change_in_production" # MUST BE >20 CHARS
  local:
    path: /config/db.sqlite3

identity_validation:
  reset_password:
    jwt_secret: "unsecure_jwt_secret_change_in_production"

notifier:
  filesystem:
    filename: /config/notification.txt

identity_providers:
  oidc:
    ## HMAC and RSA keys are injected securely via docker-compose environment variables and file mounts.
    clients:
      - client_id: grimmory
        client_name: Grimmory
        client_secret: "$pbkdf2-sha512$310000$RdVfdm4XeaexvvEaPKeVpg$H3kO5Xm.u2vIIBVafScIsFEyZxP5tvoz44zUqkXiKtKDYtWNBDEjKLhMOh68HdidGoitFVjoFUmVvfUy3x4nVA" 
        public: false
        authorization_policy: one_factor
        redirect_uris:
          - https://grimmory.home.stefancyliax.de/api/auth/callback/openid
          - https://grimmory.home.stefancyliax.de/login/oauth2/code/oidc
        scopes:
          - openid
          - profile
          - email
        userinfo_signed_response_alg: none

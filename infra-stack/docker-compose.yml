## Infra Stack

services:

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=10.1.23.184,homepage.home.stefancyliax.de
    # ports:
    #   - 3002:3000
    volumes:
      - ./homepage:/app/config # Binds the local declarative YAML files
      - /var/run/docker.sock:/var/run/docker.sock:ro # Allows native Docker stats widgets later

  prometheus:
    image: prom/prometheus:v3
    container_name: prometheus
    restart: unless-stopped
    # ports:
    #   - 9090:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    # ports:
    #   - 3001:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Default password, user can change later
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_PROXY_ENABLED=true
      - GF_AUTH_PROXY_HEADER_NAME=Remote-User
      - GF_AUTH_PROXY_HEADER_PROPERTY=username
      - GF_AUTH_PROXY_AUTO_SIGN_UP=true
      - GF_AUTH_PROXY_HEADERS=Email:Remote-Email,Name:Remote-Name
      - INFLUXDB_ADMIN_TOKEN=$INFLUXDB_ADMIN_TOKEN

  influxdb:
    image: influxdb:2
    container_name: influxdb
    restart: unless-stopped
    ports:
      - 8086:8086
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - ./influxdb/config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=$INFLUXDB_ADMIN_PASSWORD
      - DOCKER_INFLUXDB_INIT_ORG=homelab
      - DOCKER_INFLUXDB_INIT_BUCKET=homelab
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=$INFLUXDB_ADMIN_TOKEN

  authelia:
    image: authelia/authelia
    container_name: authelia
    restart: unless-stopped
    volumes:
      - ./authelia:/config
    environment:
      - TZ=Europe/Berlin

  caddy:
    build: ./caddy
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - PORKBUN_API_KEY=$PORKBUN_API_KEY
      - PORKBUN_API_SECRET_KEY=$PORKBUN_API_SECRET_KEY
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    restart: unless-stopped
    command: serve
    init: true
    ports:
      - "2586:80"
    volumes:
      - ./ntfy:/etc/ntfy:ro
      - ntfy_cache:/var/cache/ntfy
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "http://localhost:80/v1/health", "-O", "-"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  prometheus_data:
  grafana_data:
  influxdb_data:
  ntfy_cache:
  caddy_data:
  caddy_config:
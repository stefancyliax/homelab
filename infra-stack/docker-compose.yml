## Infra Stack

services:
  webserver:
    image: nginx
    container_name: webserver
    ports:
      - 8004:80
    restart: unless-stopped
  


  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=10.1.23.184:3002,10.1.23.184
    ports:
      - 3002:3000
    volumes:
      - ./homepage:/app/config # Binds the local declarative YAML files
      - /var/run/docker.sock:/var/run/docker.sock:ro # Allows native Docker stats widgets later
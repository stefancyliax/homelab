## Services Stack

services:
  webserver:
    image: nginx
    container_name: webserver
    ports:
      - 8001:80
    restart: unless-stopped
  
  zerobyte:
    image: ghcr.io/nicotsx/zerobyte:latest
    container_name: zerobyte
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN # Required for fuse mounts handling by restic
    ports:
      - "4096:4096"
    devices:
      - /dev/fuse:/dev/fuse
    environment:
      - TZ=UTC 
      - BASE_URL=http://10.1.23.224:4096 # Update when exposing behind a proxy
      - APP_SECRET=${ZEROBYTE_APP_SECRET} # Ensure this is passed securely via Dockhand environments!
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - zerobyte_data:/var/lib/zerobyte
      - /etc/rclone/rclone.conf:/root/.config/rclone/rclone.conf:ro
      # TODO: Mount the host directories you actually want backed up as read-only below.
      - /mnt/data:/mnt/data:ro

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://10.1.23.17:11434
    volumes:
      - open-webui_data:/app/backend/data

  n8n:
    image: docker.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://10.1.23.224:5678/
      GENERIC_TIMEZONE: Europe/Berlin
    volumes:
      - n8n_data:/home/node/.n8n

  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - nocodb_data:/usr/app/data

  grimoire:
    image: goniszewski/grimoire:latest 
    container_name: grimoire
    restart: unless-stopped
    environment:
      - PORT=5173
      - PUBLIC_HTTPS_ONLY=false
      - PUBLIC_SIGNUP_DISABLED=false
    volumes:
      - grimoire_data:/app/data/
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:$PORT/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "5173:5173"

  nextexplorer:
    image: nxzai/explorer:latest
    container_name: nextexplorer
    restart: unless-stopped
    ports:
      - '3001:3000'
    volumes:
      - ./config:/config
      - ./cache:/cache
      # Each /mnt/<Label> mount becomes a top-level volume in the UI
      - /mnt/data:/mnt/Files
    environment:
      - NODE_ENV=production
      - PUBLIC_URL=http://10.1.23.224:3001

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - /mnt/data:/media
    devices:
      - /dev/dri:/dev/dri

volumes:
  zerobyte_data:
  open-webui_data:
  n8n_data:
  nocodb_data:
  grimoire_data:
  jellyfin_config:
  jellyfin_cache:

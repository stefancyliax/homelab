## Services Stack

services:

  zerobyte:
    image: ghcr.io/nicotsx/zerobyte:latest
    container_name: zerobyte
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN # Required for fuse mounts handling by restic
    ports:
      - "4096:4096"
    devices:
      - /dev/fuse:/dev/fuse
    environment:
      - TZ=UTC 
      - BASE_URL=http://10.1.23.224:4096 # Update when exposing behind a proxy
      - APP_SECRET=${ZEROBYTE_APP_SECRET} # Ensure this is passed securely via Dockhand environments!
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - zerobyte_data:/var/lib/zerobyte
      - /etc/rclone/rclone.conf:/root/.config/rclone/rclone.conf:ro
      # TODO: Mount the host directories you actually want backed up as read-only below.
      - /mnt/data:/mnt/data:ro

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://10.1.23.17:11434
    volumes:
      - open-webui_data:/app/backend/data

  n8n:
    image: docker.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: "false"
      WEBHOOK_URL: http://10.1.23.224:5678/
      GENERIC_TIMEZONE: Europe/Berlin
    volumes:
      - n8n_data:/home/node/.n8n

  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - nocodb_data:/usr/app/data

  nextexplorer:
    image: nxzai/explorer:latest
    container_name: nextexplorer
    restart: unless-stopped
    ports:
      - '3001:3000'
    volumes:
      - ./config:/config
      - ./cache:/cache
      # Each /mnt/<Label> mount becomes a top-level volume in the UI
      - /mnt/data:/mnt/Files
    environment:
      - NODE_ENV=production
      - PUBLIC_URL=http://10.1.23.224:3001

  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    container_name: speaches
    volumes:
      - hf-hub-cache:/home/ubuntu/.cache/huggingface/hub
    restart: unless-stopped
    environment:
      - TRANSCRIPTION_MODEL_ID=Systran/faster-distil-whisper-base
      - SPEACHES_BASE_URL=http://10.1.23.224:8000
      - CHAT_COMPLETION_BASE_URL=""
      # - SPEACHES_LOOPBACK_HOST_URL=http://127.0.0.1:8000
    ports:
      - 8000:8000
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://0.0.0.0:8000/health"] # TODO: won't work if a user changes the port
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  grimmory:
    image: grimmory/grimmory:latest
    container_name: grimmory
    restart: unless-stopped
    depends_on:
      grimmory-db:
        condition: service_healthy
    ports:
      - "6060:6060"
    environment:
      - USER_ID=1000
      - GROUP_ID=100
      - TZ=Europe/Berlin
      - DATABASE_URL=jdbc:mariadb://grimmory-db:3306/grimmory
      - DATABASE_USERNAME=grimmory
      - DATABASE_PASSWORD=${GRIMMORY_DB_PASSWORD}
      - DISK_TYPE=LOCAL
    volumes:
      - grimmory_data:/app/data
      - /mnt/data/grimmory/books:/books
      - /mnt/data/grimmory/bookdrop:/bookdrop
    healthcheck:
      test: wget -q -O - http://localhost:6060/api/v1/healthcheck
      interval: 60s
      retries: 5
      start_period: 60s
      timeout: 10s

  grimmory-db:
    image: lscr.io/linuxserver/mariadb:latest
    container_name: grimmory-db
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Europe/Berlin
      - MYSQL_ROOT_PASSWORD=${GRIMMORY_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=grimmory
      - MYSQL_USER=grimmory
      - MYSQL_PASSWORD=${GRIMMORY_DB_PASSWORD}
    volumes:
      - grimmory_mariadb:/config
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  kestra:
    image: kestra/kestra:latest
    container_name: kestra
    restart: unless-stopped
    stop_grace_period: 6m
    user: "root"
    command: server standalone
    depends_on:
      kestra-db:
        condition: service_healthy
    ports:
      - "8082:8080"
      - "8083:8081"
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra-db:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: ${KESTRA_DB_PASSWORD}
        kestra:
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmp-dir:
              path: /tmp/kestra-wd/tmp
          url: http://10.1.23.224:8082/
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd

  kestra-db:
    image: postgres:18
    container_name: kestra-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: ${KESTRA_DB_PASSWORD}
    volumes:
      - kestra_postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10

  stirling-pdf:
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    ports:
      - "8084:8080"
    volumes:
      - stirlingpdf_data:/configs

  grimoire:
    image: goniszewski/grimoire:latest # or change from 'latest' to 'preview' to use the latest preview version
    container_name: grimoire
    restart: unless-stopped
    environment:
      - PORT=5173
      - PUBLIC_HTTPS_ONLY=false
      - PUBLIC_SIGNUP_DISABLED=false
      - ORIGIN=https://grimoire.home.stefancyliax.de
    volumes:
      - grimoire_data:/app/data/
    ports:
      - "5173:5173"

  tududi:
    image: chrisvel/tududi:latest
    container_name: tududi
    environment:
      - TUDUDI_USER_EMAIL=${TUDUDI_USER_EMAIL:-admin@example.com}
      - TUDUDI_USER_PASSWORD=${TUDUDI_USER_PASSWORD:-changeme}
      - TUDUDI_SESSION_SECRET=${TUDUDI_SESSION_SECRET:-changeme-please-use-openssl}
      - TUDUDI_ALLOWED_ORIGINS=https://tududi.home.stefancyliax.de
      - TUDUDI_TRUST_PROXY=true
      - TUDUDI_UPLOAD_PATH=/app/backend/uploads
      - PUID=1000
      - PGID=100
    volumes:
      - tududi_db:/app/backend/db
      - tududi_uploads:/app/backend/uploads
    ports:
      - "3002:3002"
    restart: unless-stopped

volumes:
  grimoire_data:
  zerobyte_data:
  open-webui_data:
  n8n_data:
  nocodb_data:
  hf-hub-cache:
  grimmory_data:
  grimmory_mariadb:
  kestra_data:
  kestra_postgres:
  stirlingpdf_data:
  tududi_db:
  tududi_uploads:
